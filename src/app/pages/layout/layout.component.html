<div class="dashboard-container">
  
  <!-- BARRA LATERAL (SIDEBAR) -->
  <aside class="sidebar">
    <div>
      <!-- Encabezado de la Botica -->
      <div class="sidebar-header">
        <img src="images/imagotipo-marleny.png" alt="Botica MarlenyFarma" class="logo-img">
      </div>

      <!-- Menús renderizados dinámicamente según el Rol -->
      <nav class="sidebar-menu">
        <p class="menu-section-title">GENERAL</p>
        <ul>
          @for (menu of menus(); track menu.idMenu) {
            <li>
              <a [routerLink]="menu.url" 
                 routerLinkActive="active-link"
                 [routerLinkActiveOptions]="{exact: true}">
                <!-- Icono dinámico enviado desde la Base de Datos -->
                <i class="material-icons">{{ menu.icono }}</i>
                <span>{{ menu.nombre }}</span>
              </a>
            </li>
          }
        </ul>
      </nav>
    </div>

    <!-- Botón de Cerrar Sesión en la parte inferior -->
    <div class="sidebar-footer">
      <a href="/login" class="logout-link">
        <i class="material-icons">logout</i>
        <span>Cerrar Sesión</span>
      </a>
    </div>
  </aside>

  <!-- CONTENEDOR DE CONTENIDO PRINCIPAL -->
  <main class="main-content">
    
    <!-- Barra superior decorativa (Navbar) -->
    <header class="top-navbar">
      <div class="breadcrumb">
        <i class="material-icons">description</i>
        <span>Páginas</span>
        <span class="separator">›</span>
        <span class="current-page">Dashboard</span>
      </div>

      <div class="search-bar">
        <i class="material-icons">search</i>
        <input type="text" placeholder="Buscar...">
      </div>

      <div class="navbar-actions">
        <i class="material-icons">notifications_none</i>
        <i class="material-icons">settings</i>
        <div class="user-chip">
          <img src="images/isotipo-marleny.png" alt="Logo" class="user-avatar">
          <span>{{ usuarioActual()?.nombre }} {{ usuarioActual()?.apellido }}</span>
          <i class="material-icons dropdown-icon">expand_more</i>
        </div>
      </div>
    </header>

    <!-- Espacio dinámico de Angular donde se pintará el CRUD de Categoria, Proveedor, etc. -->
    <section class="content-body">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
