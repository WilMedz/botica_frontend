<h2>Categorías</h2>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Descripción</th>
      <th>Estado</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let categoria of categorias()">
      <td>{{ categoria.idCategoria }}</td>
      <td>{{ categoria.nombre }}</td>
      <td>{{ categoria.descripcion }}</td>
      <td>{{ categoria.estado ? 'Activo' : 'Inactivo' }}</td>
    </tr>
  </tbody>
</table>
