<router-outlet></router-outlet>

<div class="mat-elevation-z8">
  <div class="card-toolbar">
    <mat-form-field>
      <mat-label>Buscar</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ej. Analgésicos" #input>
    </mat-form-field>
    @if (authService.esAdministrador()) {
      <button mat-fab (click)="openModal()">
        <mat-icon>add</mat-icon>
      </button>
    }
  </div>

  <table mat-table [dataSource]="$dataSource()" matSort>
    <ng-container matColumnDef="idCategoria">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
      <td mat-cell *matCellDef="let row"> {{row.idCategoria}} </td>
    </ng-container>
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> NOMBRE </th>
      <td mat-cell *matCellDef="let row"> {{row.nombre}} </td>
    </ng-container>
    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> DESCRIPCIÓN </th>
      <td mat-cell *matCellDef="let row"> {{row.descripcion}} </td>
    </ng-container>
    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> ESTADO </th>
      <td mat-cell *matCellDef="let row"> {{row.estado ? 'Activo' : 'Inactivo'}} </td>
    </ng-container>
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> ACCIONES </th>
      <td mat-cell *matCellDef="let row">
        @if (authService.esAdministrador()) {
          <div class="acciones">
            <button mat-flat-button (click)="openModal(row.idCategoria)">
              <span>Editar</span>
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-flat-button color="warn" (click)="delete(row.idCategoria)">
              <span>Eliminar</span>
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        }
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="5">No se encontraron resultados para "{{input.value}}"</td>
    </tr>
  </table>
  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Seleccionar página"></mat-paginator>
</div>
