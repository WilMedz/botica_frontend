<h2>Gestión de Roles</h2>

<div class="rol-layout">
  <!-- FORMULARIO DE EDICIÓN / REGISTRO -->
  <div class="form-container">
    <h3>{{ isEditing ? 'Editar' : 'Nuevo' }} Rol</h3>
    <form [formGroup]="rolForm" (ngSubmit)="guardar()" class="form-horizontal">
      <mat-form-field appearance="outline">
        <mat-label>Nombre de Rol</mat-label>
        <input matInput formControlName="nombre" placeholder="Ej. ADMINISTRADOR" required>
        <mat-error *ngIf="rolForm.get('nombre')?.hasError('required')">El nombre del rol es obligatorio</mat-error>
      </mat-form-field>

      <div class="form-actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="rolForm.invalid">
          <mat-icon>save</mat-icon>
          <span>{{ isEditing ? 'Actualizar' : 'Guardar' }}</span>
        </button>
        <button mat-button type="button" (click)="resetForm()" *ngIf="isEditing">
          <mat-icon>cancel</mat-icon>
          <span>Cancelar</span>
        </button>
      </div>
    </form>
  </div>

  <!-- LISTA DE ROLES -->
  <div class="table-container">
    <h3>Lista de Roles</h3>
    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="$dataSource()">

        <ng-container matColumnDef="idRol">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let row"> {{row.idRol}} </td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef> NOMBRE ROL </th>
          <td mat-cell *matCellDef="let row"> {{row.nombre}} </td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef> ACCIONES </th>
          <td mat-cell *matCellDef="let row">
            <button mat-flat-button (click)="editar(row)">
              <span>Editar</span>
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-flat-button color="warn" (click)="eliminar(row.idRol)">
              <span>Eliminar</span>
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </div>
</div>
