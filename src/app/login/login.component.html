<div class="login-container">
    <div class="glass-card">

        <div class="avatar">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="48" height="48" fill="rgba(255,255,255,0.85)">
                <path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-2 10h-4v4H11v-4H7v-2h4V7h2v4h4v2z"/>
            </svg>
        </div>

        <h2 class="login-title">Bienvenido</h2>
        <p class="login-subtitle">Sistema de Gestión Farmacéutica</p>

        <form [formGroup]="loginForm" (ngSubmit)="login()">

            <div class="input-group">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)" width="18" height="18">
                        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                    </svg>
                </span>
                <input
                    class="glass-input"
                    formControlName="username"
                    placeholder="Usuario"
                    autocomplete="off"
                />
            </div>
            <div class="field-error" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.hasError('required')">
                El usuario es requerido
            </div>

            <div class="input-group">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)" width="18" height="18">
                        <path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/>
                    </svg>
                </span>
                <input
                    class="glass-input"
                    formControlName="password"
                    type="password"
                    placeholder="Contraseña"
                />
            </div>
            <div class="field-error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')">
                La contraseña es requerida
            </div>
            <div class="field-error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('minlength')">
                Mínimo 3 caracteres
            </div>

            <button
                class="login-btn"
                type="submit"
                [disabled]="!isFormValid() || isLoggingIn()">
                {{ isLoggingIn() ? 'INGRESANDO...' : 'INGRESAR' }}
            </button>

        </form>
    </div>
</div>
